<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Media</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00f2ff; font-family: 'Arial', sans-serif; }
        
        /* Diamond Neon Admin Dashboard */
        #admin-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; 
            background: linear-gradient(45deg, #000, #1a1a1a); border: 4px ridge #00f2ff; box-shadow: 0 0 50px #00f2ff; }
        .diamond-btn { background: #000; color: #00f2ff; border: 2px solid #00f2ff; padding: 20px; margin: 10px; 
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); cursor: pointer; font-weight: bold; }
        .diamond-btn:hover { background: #00f2ff; color: #000; }

        /* User Interface */
        .wrapper { display: none; flex-direction: column; height: 100vh; justify-content: space-between; }
        .ad-banner { height: 15vh; background: #000; border-top: 1px solid #333; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .media-viewer { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #timer { text-align: center; font-size: 25px; color: #ff00ff; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <!-- Diamond Admin Panel -->
    <div id="admin-panel">
        <h1 style="text-shadow: 0 0 20px #00f2ff;">💎 ADMIN DIAMOND PORTAL 💎</h1>
        <input type="file" id="fInput" style="color: #00f2ff;">
        <button class="diamond-btn" onclick="upload()">GENERATE DIAMOND LINK</button>
        <div id="link-area" style="margin-top:20px;"></div>
    </div>

    <!-- User View -->
    <div class="wrapper" id="user-ui">
        <div class="ad-banner">TOP BANNER AD</div>
        <div class="media-viewer" id="media-box"></div>
        <div class="ad-banner">BOTTOM BANNER AD</div>
        <div id="timer">Redirecting in: 10</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // Admin Access
        if (params.get('admin') === '123456') {
            document.getElementById('admin-panel').style.display = 'flex';
        }

        // Redirect & UI Logic
        if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            const m = decodeURIComponent(params.get('media'));
            document.getElementById('media-box').innerHTML = m.match(/\.(mp4|mov)$/) 
                ? `<video src="${m}" controls style="max-width:100%; max-height:60vh;"></video>` 
                : `<img src="${m}" style="max-width:100%; max-height:60vh; border: 2px solid #00f2ff;">`;

            let c = 10;
            setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting: " + c;
                if(c <= 0) {
                    const ref = document.referrer;
                    window.location.href = ref.includes('facebook') ? 'https://facebook.com' : 
                                          ref.includes('pinterest') ? 'https://pinterest.com' : 
                                          ref.includes('snapchat') ? 'https://snapchat.com' : 'https://google.com';
                }
            }, 1000);
        }

        // Upload
        async function upload() {
            const f = document.getElementById('fInput').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            document.getElementById('link-area').innerHTML = `<input value="${link}" id="c" style="width:300px;"><button onclick="document.execCommand('copy')">COPY</button>`;
        }
    </script>
</body>
      </html>
