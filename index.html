<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Diamond Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Arial Black', sans-serif; }

        /* Full Screen Diamond Admin Panel */
        #admin-panel { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #001f3f, #000); border: 20px ridge #00f2ff; box-shadow: inset 0 0 150px #00f2ff; padding: 40px; }
        
        .glow-title { font-size: 3.5rem; color: #fff; text-shadow: 0 0 30px #00f2ff; margin-bottom: 50px; text-align: center; }
        
        .file-input { background: #000; border: 6px solid #00f2ff; padding: 40px; font-size: 1.8rem; color: #00f2ff; width: 85%; border-radius: 30px; margin-bottom: 40px; }
        
        .diamond-btn { background: #000; color: #00f2ff; border: 8px solid #00f2ff; padding: 50px 100px; font-size: 2.5rem; 
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); cursor: pointer; font-weight: bold; transition: 0.4s; }
        .diamond-btn:hover { background: #00f2ff; color: #000; transform: scale(1.05); }
        
        #link-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 50px; }
        
        .big-copy-btn { background: #ff00ff; color: #fff; padding: 40px 80px; font-size: 2.5rem; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 0 30px #ff00ff; }

        /* User Interface */
        .wrapper { display: none; flex-direction: column; height: 100vh; justify-content: space-between; align-items: center; }
        .ad-banner { padding: 15px; width: 100%; display: flex; justify-content: center; }
        .media-viewer { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #timer { font-size: 50px; color: #ff00ff; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <h1 class="glow-title">💎 DIAMOND LUXURY PORTAL 💎</h1>
        <input type="file" id="fInput" class="file-input" accept="image/*,video/*">
        <button class="diamond-btn" onclick="upload()">GENERATE DIAMOND LINK</button>
        <div id="link-area"></div>
    </div>

    <!-- User Interface -->
    <div class="wrapper" id="user-ui">
        <div class="ad-banner">
            <script>atOptions = {'key' : '0d0e5a3cb14ef22c257b6b2ea39fe56c', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {}};</script>
            <script src="https://www.highperformanceformat.com/0d0e5a3cb14ef22c257b6b2ea39fe56c/invoke.js"></script>
        </div>

        <div class="media-viewer" id="media-box"></div>

        <div class="ad-banner">
            <script>atOptions = {'key' : 'd7e4305ce2f4e879147ff4785f70295d', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {}};</script>
            <script src="https://www.highperformanceformat.com/d7e4305ce2f4e879147ff4785f70295d/invoke.js"></script>
        </div>
        <div id="timer">30</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === '123456') document.getElementById('admin-panel').style.display = 'flex';

        if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            const m = decodeURIComponent(params.get('media'));
            document.getElementById('media-box').innerHTML = m.match(/\.(mp4|mov|webm)$/) 
                ? `<video src="${m}" controls style="max-width:95%; border: 10px solid #00f2ff;"></video>` 
                : `<img src="${m}" style="max-width:95%; border: 10px solid #00f2ff;">`;

            let c = 30;
            const t = setInterval(() => {
                c--;
                document.getElementById('timer').innerText = c;
                if(c <= 0) {
                    clearInterval(t);
                    const ref = document.referrer;
                    window.location.href = ref.includes('facebook') ? 'https://facebook.com' : 
                                          ref.includes('pinterest') ? 'https://pinterest.com' : 
                                          ref.includes('snapchat') ? 'https://snapchat.com' : 'https://google.com';
                }
            }, 1000);
        }

        async function upload() {
            const f = document.getElementById('fInput').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            document.getElementById('link-area').innerHTML = `
                <input value="${link}" id="c" style="width:90%; padding:30px; font-size:2rem; margin-bottom:40px; border-radius:20px;">
                <button class="big-copy-btn" onclick="copyLink()">💎 COPY DIAMOND LINK 💎</button>`;
        }

        function copyLink() {
            const copyText = document.getElementById("c");
            copyText.select();
            document.execCommand("copy");
            alert("Link Copied Successfully!");
        }
    </script>
</body>
</html>
