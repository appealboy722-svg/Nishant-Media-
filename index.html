<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #39ff14; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Neon Admin Panel - Full Screen */
        #admin-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #39ff14; box-shadow: 0 0 30px #39ff14; position: absolute; top:0; left:0; width: 100%; z-index: 10000; background: black; }
        input, button { background: #000; color: #39ff14; border: 2px solid #39ff14; padding: 20px; margin: 15px; font-size: 20px; cursor: pointer; }
        
        /* User Interface */
        .wrapper { display: none; flex-direction: column; height: 100vh; justify-content: space-between; }
        .ad-banner { height: 15vh; background: #111; display: flex; align-items: center; justify-content: center; border: 1px dashed #39ff14; font-size: 20px; }
        .media-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #timer { text-align: center; font-size: 30px; padding: 15px; color: #39ff14; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Admin Panel (HIDDEN BY DEFAULT) -->
    <div id="admin-panel">
        <h1 style="text-shadow: 0 0 15px #39ff14;">ADMIN DASHBOARD</h1>
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload & Generate Link</button>
        <div id="link-area" style="text-align:center;"></div>
    </div>

    <!-- User Interface (SHOWN TO USERS) -->
    <div class="wrapper" id="user-ui">
        <div class="ad-banner">TOP BANNER AD</div>
        <div class="media-area" id="media-box"></div>
        <div class="ad-banner">BOTTOM BANNER AD</div>
        <div id="timer">Redirecting in: 10</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // 1. Privacy Logic: Admin only via URL
        if (params.get('admin') === '123456') {
            document.getElementById('admin-panel').style.display = 'flex';
            document.getElementById('user-ui').style.display = 'none'; // Admin panel hide user UI
        } else if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            document.getElementById('admin-panel').style.display = 'none'; // User panel hide admin UI
            
            // Media Render
            const m = decodeURIComponent(params.get('media'));
            const container = document.getElementById('media-box');
            container.innerHTML = m.match(/\.(mp4|webm|mov)$/) 
                ? `<video src="${m}" controls style="max-width:100%; max-height:70vh;"></video>` 
                : `<img src="${m}" style="max-width:100%; max-height:70vh;">`;

            // Redirect Timer
            let c = 10;
            const t = setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting in: " + c;
                if(c <= 0) { clearInterval(t); window.location.href = document.referrer || 'https://google.com'; }
            }, 1000);
        }

        // Upload
        async function upload() {
            const f = document.getElementById('fileInput').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            document.getElementById('link-area').innerHTML = `<input type="text" id="copyLink" value="${link}" style="width:80%;"><button onclick="copy()">Copy</button>`;
        }

        function copy() {
            const copyText = document.getElementById("copyLink");
            copyText.select();
            document.execCommand("copy");
            alert("Copied!");
        }
    </script>
</body>
</html>
