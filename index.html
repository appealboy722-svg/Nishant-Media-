<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Media Portal</title>
    <style>
        body { margin: 0; background: #050505; color: #00ffcc; font-family: sans-serif; }
        
        /* Premium Neon Admin Panel */
        #admin-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #000; border: 2px solid #00ffcc; }
        .admin-box { border: 1px solid #00ffcc; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px #00ffcc; text-align: center; }
        
        /* User View */
        #user-ui { display: none; flex-direction: column; min-height: 100vh; }
        .ad-zone { padding: 20px; text-align: center; background: #111; border-bottom: 1px solid #333; }
        .media-zone { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 40px 10px; }
        #timer { text-align: center; font-size: 25px; color: #ff0055; padding: 20px; }
        
        input, button { background: #111; color: #00ffcc; border: 1px solid #00ffcc; padding: 15px; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- Admin Section -->
    <div id="admin-panel">
        <div class="admin-box">
            <h1>ADMIN CONTROL</h1>
            <input type="file" id="f">
            <button onclick="upload()">Generate Link</button>
            <div id="link-area"></div>
        </div>
    </div>

    <!-- User Section -->
    <div id="user-ui">
        <div class="ad-zone">TOP BANNER ADS</div>
        <div class="media-zone" id="m-box"></div>
        <div id="timer">Redirecting in 10s...</div>
        <div class="ad-zone">BOTTOM BANNER ADS</div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);

        // 1. Admin Access
        if (p.get('admin') === '123456') document.getElementById('admin-panel').style.display = 'flex';

        // 2. User View & Redirect Detector
        if (p.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            const m = decodeURIComponent(p.get('media'));
            document.getElementById('m-box').innerHTML = m.match(/\.(mp4|mov)$/) ? `<video src="${m}" controls width="100%"></video>` : `<img src="${m}" width="100%">`;
            
            let c = 10;
            const t = setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting in: " + c + "s";
                if(c <= 0) {
                    clearInterval(t);
                    // Redirect logic: Returns to where user came from
                    window.location.href = document.referrer || 'https://google.com';
                }
            }, 1000);
        }

        // 3. Lightning Fast Upload
        async function upload() {
            const f = document.getElementById('f').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const l = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            
            document.getElementById('link-area').innerHTML = `
                <input id="cl" value="${l}" style="width:100%">
                <button onclick="copy()">COPY LINK</button>
            `;
        }

        function copy() {
            const i = document.getElementById("cl");
            i.select();
            document.execCommand("copy");
            alert("Link Copied!");
        }
    </script>
</body>
</html>
