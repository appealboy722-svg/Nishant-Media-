<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; justify-content: space-between; }
        .ad-banner { height: 15vh; background: #ddd; display: flex; align-items: center; justify-content: center; }
        .content { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        #admin-panel { position: fixed; top: 0; left: 0; width: 100%; background: white; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <!-- Admin Dashboard (Only visible via URL query) -->
    <div id="admin-panel">
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload & Generate Link</button>
        <div id="links"></div>
    </div>

    <!-- User View Area -->
    <div class="wrapper" id="user-view" style="display:none;">
        <div class="ad-banner" id="top-ad">AD SPACE</div>
        <div class="content" id="media-container"></div>
        <div class="ad-banner" id="bottom-ad">AD SPACE</div>
        <div id="timer" style="text-align:center;">Redirecting in: 10</div>
    </div>

    <script>
        // 1. Admin Privacy Check
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === '123456') document.getElementById('admin-panel').style.display = 'block';

        // 2. User View & Redirection Logic
        if (params.get('media')) {
            document.getElementById('user-view').style.display = 'flex';
            const mediaUrl = params.get('media');
            const container = document.getElementById('media-container');
            
            // Check if Image or Video
            if(mediaUrl.match(/\.(mp4|webm)$/)) {
                container.innerHTML = `<video src="${mediaUrl}" controls style="max-width:100%"></video>`;
            } else {
                container.innerHTML = `<img src="${mediaUrl}" style="max-width:100%">`;
            }

            // Countdown & Redirect
            let count = 10;
            setInterval(() => {
                count--;
                document.getElementById('timer').innerText = "Redirecting in: " + count;
                if (count <= 0) window.location.href = document.referrer || 'https://google.com';
            }, 1000);
        }

        // 3. Upload Function
        async function upload() {
            const file = document.getElementById('fileInput').files[0];
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', 'Nishant Media');
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const data = await res.json();
            const shareLink = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(data.secure_url);
            document.getElementById('links').innerHTML = `Copy Link: <input value="${shareLink}">`;
        }
    </script>
</body>
</html>
