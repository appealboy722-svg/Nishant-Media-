<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Media Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #39ff14; font-family: 'Courier New', monospace; }
        
        /* Neon Admin Panel */
        #admin-panel { display: none; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #39ff14; box-shadow: 0 0 20px #39ff14; }
        input, button { background: #000; color: #39ff14; border: 1px solid #39ff14; padding: 15px; margin: 10px; font-size: 18px; }
        
        /* User View */
        .wrapper { display: none; flex-direction: column; height: 100vh; justify-content: space-between; }
        .ad-banner { height: 15vh; background: #111; display: flex; align-items: center; justify-content: center; border: 1px dashed #39ff14; }
        .media-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #timer { text-align: center; font-size: 24px; padding: 10px; color: #39ff14; }
    </style>
</head>
<body>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <h1 style="text-shadow: 0 0 10px #39ff14;">ADMIN DASHBOARD</h1>
        <input type="file" id="fileInput">
        <button onclick="upload()">Upload & Generate Link</button>
        <div id="link-area"></div>
    </div>

    <!-- User Interface -->
    <div class="wrapper" id="user-ui">
        <div class="ad-banner">TOP BANNER AD</div>
        <div class="media-area" id="media-box"></div>
        <div class="ad-banner">BOTTOM BANNER AD</div>
        <div id="timer">Redirecting in: 10</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // 1. Admin Auth
        if (params.get('admin') === '123456') {
            document.getElementById('admin-panel').style.display = 'flex';
        }

        // 2. User View Logic
        if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            const m = decodeURIComponent(params.get('media'));
            const container = document.getElementById('media-box');
            
            if(m.match(/\.(mp4|webm|mov)$/)) {
                container.innerHTML = `<video src="${m}" controls style="max-width:100%; max-height:60vh;"></video>`;
            } else {
                container.innerHTML = `<img src="${m}" style="max-width:100%; max-height:60vh;">`;
            }

            let c = 10;
            const t = setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting in: " + c;
                if(c <= 0) { clearInterval(t); window.location.href = document.referrer || 'https://google.com'; }
            }, 1000);
        }

        // 3. Upload with Copy Button
        async function upload() {
            const f = document.getElementById('fileInput').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            
            document.getElementById('link-area').innerHTML = `
                <input type="text" id="copyLink" value="${link}" style="width:300px;">
                <button onclick="copyToClipboard()">Copy Link</button>
            `;
        }

        function copyToClipboard() {
            const copyText = document.getElementById("copyLink");
            copyText.select();
            document.execCommand("copy");
            alert("Link Copied!");
        }
    </script>
</body>
  </html>
