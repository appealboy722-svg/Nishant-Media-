<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: monospace; }
        #admin-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        #user-ui { display: none; text-align: center; }
        .ad { height: 15vh; background: #222; border: 1px solid #39ff14; margin: 10px; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <input type="file" id="f">
        <button onclick="up()">Upload</button>
        <div id="link-area"></div>
    </div>

    <div id="user-ui">
        <div class="ad">TOP AD</div>
        <div id="media-box"></div>
        <div class="ad">BOTTOM AD</div>
        <h2 id="timer">10</h2>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        
        // Admin Access Logic
        if (params.get('admin') === '123456') {
            document.getElementById('admin-panel').style.display = 'flex';
        } 
        // User Content Logic
        else if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'block';
            const m = decodeURIComponent(params.get('media'));
            document.getElementById('media-box').innerHTML = m.match(/\.(mp4|mov)$/) 
                ? `<video src="${m}" controls style="width:100%"></video>` 
                : `<img src="${m}" style="width:100%">`;

            let c = 10;
            const t = setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting: " + c;
                if(c <= 0) { 
                    clearInterval(t); 
                    window.location.href = document.referrer || 'https://google.com'; 
                }
            }, 1000);
        }

        async function up() {
            const f = document.getElementById('f').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            // Yahi exact link generate hoga
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            document.getElementById('link-area').innerHTML = `<input value="${link}" id="c" style="width:80%"><button onclick="copy()">Copy</button>`;
        }

        function copy() {
            document.getElementById('c').select();
            document.execCommand('copy');
            alert('Link Copied!');
        }
    </script>
</body>
</html>
