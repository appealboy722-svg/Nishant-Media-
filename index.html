<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nishant Media Portal</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .ad-space { background: #eee; padding: 20px; margin: 10px 0; text-align: center; min-height: 100px; border: 1px dashed #999; }
        #admin-panel { display: none; border: 2px solid #333; padding: 20px; margin-top: 20px; }
        .main-content { max-width: 800px; margin: auto; }
    </style>
</head>
<body>

<div class="main-content">
    <!-- Header Ad -->
    <div class="ad-space">Google Adsense / Search Ads Here</div>

    <!-- Admin Section -->
    <div id="login-box">
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="checkAuth()">Access Dashboard</button>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel">
        <h3>Upload Image</h3>
        <input type="file" id="imageFile">
        <button onclick="uploadImage()">Upload and Get Link</button>
        <div id="result" style="margin-top: 15px; word-break: break-all;"></div>
    </div>

    <!-- Content Area -->
    <div class="ad-space">Content Ads / Native Ads Here</div>
</div>

<script>
    function checkAuth() {
        const p = document.getElementById('pass').value;
        if (p === '123456') {
            document.getElementById('admin-panel').style.display = 'block';
            document.getElementById('login-box').style.display = 'none';
        } else {
            alert('Invalid Password');
        }
    }

    async function uploadImage() {
        const file = document.getElementById('imageFile').files[0];
        if (!file) return alert('Select image first');

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', 'Nishant Media');

        const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/image/upload', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();
        document.getElementById('result').innerHTML = `
            <p>Upload Successful!</p>
            <p>Direct Link: <a href="${data.secure_url}" target="_blank">${data.secure_url}</a></p>
        `;
    }
</script>
</body>
</html>
