<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Media</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00f2ff; font-family: 'Arial Black', sans-serif; }
        
        /* Premium Diamond Neon Dashboard */
        #admin-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #001f3f, #000); border: 8px double #00f2ff; box-shadow: 0 0 50px #00f2ff; }
        
        .glow-text { font-size: 3rem; text-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff; margin-bottom: 30px; }
        
        .file-input { background: #000; border: 3px solid #00f2ff; padding: 20px; font-size: 1.2rem; color: #fff; width: 80%; }
        
        .diamond-btn { background: #000; color: #00f2ff; border: 4px solid #00f2ff; padding: 30px 60px; font-size: 1.5rem; 
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); cursor: pointer; font-weight: bold; margin: 30px; transition: 0.3s; }
        .diamond-btn:hover { background: #00f2ff; color: #000; transform: scale(1.1); }
        
        .copy-btn { background: #ff00ff; color: #fff; padding: 20px 40px; font-size: 1.5rem; border: none; cursor: pointer; border-radius: 10px; }

        /* User Interface */
        .wrapper { display: none; flex-direction: column; height: 100vh; justify-content: space-between; }
        .ad-banner { height: 15vh; background: #000; border: 2px dashed #00f2ff; display: flex; align-items: center; justify-content: center; }
        .media-viewer { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
        #timer { text-align: center; font-size: 30px; color: #ff00ff; font-weight: bold; padding: 15px; }
    </style>
</head>
<body>

    <!-- Diamond Admin Panel -->
    <div id="admin-panel">
        <h1 class="glow-text">💎 ADMIN DIAMOND PORTAL 💎</h1>
        <!-- Gallery Add -->
        <input type="file" id="fInput" class="file-input" accept="image/*,video/*">
        <button class="diamond-btn" onclick="upload()">GENERATE DIAMOND LINK</button>
        <div id="link-area" style="text-align:center; width: 90%;"></div>
    </div>

    <!-- User View -->
    <div class="wrapper" id="user-ui">
        <div class="ad-banner">TOP BANNER AD</div>
        <div class="media-viewer" id="media-box"></div>
        <div class="ad-banner">BOTTOM BANNER AD</div>
        <div id="timer">Redirecting in: 10</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === '123456') document.getElementById('admin-panel').style.display = 'flex';

        if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            const m = decodeURIComponent(params.get('media'));
            document.getElementById('media-box').innerHTML = m.match(/\.(mp4|mov|webm)$/) 
                ? `<video src="${m}" controls style="max-width:100%; max-height:60vh;"></video>` 
                : `<img src="${m}" style="max-width:100%; max-height:60vh; border: 5px solid #00f2ff;">`;

            let c = 10;
            setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting: " + c;
                if(c <= 0) {
                    const ref = document.referrer;
                    window.location.href = ref.includes('facebook') ? 'https://facebook.com' : 
                                          ref.includes('pinterest') ? 'https://pinterest.com' : 
                                          ref.includes('snapchat') ? 'https://snapchat.com' : 'https://google.com';
                }
            }, 1000);
        }

        async function upload() {
            const f = document.getElementById('fInput').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            document.getElementById('link-area').innerHTML = `
                <input value="${link}" id="c" style="width:100%; padding:15px; font-size:1.2rem; margin-bottom:20px;">
                <button class="copy-btn" onclick="copyLink()">COPY DIAMOND LINK</button>`;
        }

        function copyLink() {
            document.getElementById("c").select();
            document.execCommand("copy");
            alert("Link Copied!");
        }
    </script>
</body>
  </html>
