<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nishant Media</title>
    <style>
        body { margin: 0; background: #000; color: #39ff14; font-family: 'Segoe UI', monospace; }
        
        /* Neon Dashboard */
        #admin-panel { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a, #000); border: 3px solid #39ff14; box-shadow: 0 0 20px #39ff14; }
        .neon-input { background: transparent; border: 2px solid #39ff14; color: #fff; padding: 15px; width: 80%; margin: 10px; border-radius: 10px; }
        .neon-btn { background: #39ff14; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        /* User UI */
        .ui-wrapper { display: none; flex-direction: column; height: 100vh; }
        .ad-space { height: 15vh; background: #000; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid #333; }
        .media-viewer { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        #timer { text-align: center; font-size: 20px; color: #ff073a; padding: 10px; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h1 style="color: #39ff14; text-shadow: 0 0 10px #39ff14;">ADMIN PORTAL</h1>
        <input type="file" id="fInput" class="neon-input">
        <button class="neon-btn" onclick="upload()">Generate Link Now</button>
        <div id="link-area" style="margin-top:20px; width: 80%;"></div>
    </div>

    <div class="ui-wrapper" id="user-ui">
        <div class="ad-space">Top Ad Banner</div>
        <div class="media-viewer" id="media-box"></div>
        <div class="ad-space">Bottom Ad Banner</div>
        <div id="timer">Redirecting in: 10</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        // Admin Access
        if (params.get('admin') === '123456') {
            document.getElementById('admin-panel').style.display = 'flex';
        }

        // Detector & Redirect Logic
        if (params.get('media')) {
            document.getElementById('user-ui').style.display = 'flex';
            const m = decodeURIComponent(params.get('media'));
            document.getElementById('media-box').innerHTML = m.match(/\.(mp4|mov)$/) 
                ? `<video src="${m}" controls style="max-width:100%"></video>` 
                : `<img src="${m}" style="max-width:100%; border: 5px solid #39ff14;">`;

            let c = 10;
            setInterval(() => {
                c--;
                document.getElementById('timer').innerText = "Redirecting in: " + c;
                if(c <= 0) {
                    // Redirect Detector
                    const ref = document.referrer;
                    if(ref.includes('facebook.com')) window.location.href = 'https://facebook.com';
                    else if(ref.includes('pinterest.com')) window.location.href = 'https://pinterest.com';
                    else if(ref.includes('snapchat.com')) window.location.href = 'https://snapchat.com';
                    else window.location.href = 'https://google.com';
                }
            }, 1000);
        }

        async function upload() {
            const f = document.getElementById('fInput').files[0];
            const fd = new FormData();
            fd.append('file', f);
            fd.append('upload_preset', 'Nishant Media');
            
            const res = await fetch('https://api.cloudinary.com/v1_1/b1xksl9a/auto/upload', {method:'POST', body:fd});
            const d = await res.json();
            const link = window.location.origin + window.location.pathname + '?media=' + encodeURIComponent(d.secure_url);
            
            document.getElementById('link-area').innerHTML = `
                <input class="neon-input" id="copyLink" value="${link}">
                <button class="neon-btn" onclick="document.execCommand('copy'); alert('Copied!');">Copy Link</button>
            `;
        }
    </script>
</body>
</html>
